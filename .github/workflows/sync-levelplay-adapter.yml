# Syncs the official IronSourceVoodooAdapter podspec (CocoaPods trunk) into
# this repo as VoodooIronSourceAdapter when a new adapter version appears.
name: Sync LevelPlay adapter
run-name: Sync LevelPlay adapter

on:
  workflow_dispatch:
    inputs:
      ironsource_sdk_version:
        description: "The exact version of 'IronSourceSDK' to use"
        required: false
        default: "9.3.0.0"

concurrency:
  group: sync-levelplay-adapter
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  sync:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Tools
        run: |
          brew bundle
          echo "✅ Tools installed"

      - name: CocoaPods version
        run: |
          echo "✅ Cocoapods version: $(pod --version)"

      - name: Sync LevelPlay adapter podspec
        run: |
          OFFICIAL_LEVELPLAY_ADAPTER_POD_NAME="IronSourceVoodooAdapter"
          ADN_LEVELPLAY_ADAPTER_POD_NAME="VoodooIronSourceAdapter"
          OFFICIAL_LEVELPLAY_ADAPTER_PODSPEC_FILE_PATH="${OFFICIAL_LEVELPLAY_ADAPTER_POD_NAME}.podspec.json"
          ADN_LEVELPLAY_ADAPTER_PODSPEC_FILE_PATH="${ADN_LEVELPLAY_ADAPTER_POD_NAME}.podspec"
          ADN_LEVELPLAY_ADAPTER_JSON_PODSPEC_FILE_PATH="${ADN_LEVELPLAY_ADAPTER_PODSPEC_FILE_PATH}.json"
          IRONSOURCE_SDK_VERSION="${{ github.event.inputs.ironsource_sdk_version }}"

          echo
          echo "🔍 Fetching latest podspec ${OFFICIAL_LEVELPLAY_ADAPTER_POD_NAME}..."
          ./scripts/get_latest_podspec.sh ${OFFICIAL_LEVELPLAY_ADAPTER_POD_NAME} > ${OFFICIAL_LEVELPLAY_ADAPTER_PODSPEC_FILE_PATH}
          echo "✅ Latest podspec fetched"

          echo
          echo "🔍 Generating podspec ${ADN_LEVELPLAY_ADAPTER_POD_NAME}..."
          ./scripts/generate_podspec.sh ${OFFICIAL_LEVELPLAY_ADAPTER_PODSPEC_FILE_PATH} ${ADN_LEVELPLAY_ADAPTER_POD_NAME} ${IRONSOURCE_SDK_VERSION}
          echo "✅ Podspec generated"

          echo
          echo "🔍 Linting podspec ${ADN_LEVELPLAY_ADAPTER_POD_NAME}..."
          pod spec lint ${ADN_LEVELPLAY_ADAPTER_PODSPEC_FILE_PATH} --allow-warnings
          pod spec lint ${ADN_LEVELPLAY_ADAPTER_JSON_PODSPEC_FILE_PATH} --allow-warnings
          echo "✅ Podspec linted"
          
          echo
          echo "🔍 Adding podspec ${ADN_LEVELPLAY_ADAPTER_POD_NAME}..."
          ./scripts/add_podspec.sh ${ADN_LEVELPLAY_ADAPTER_POD_NAME}.podspec
          echo "✅ Podspec added"

          echo
          echo "🧹 Cleaning up..."
          rm -f ${OFFICIAL_LEVELPLAY_ADAPTER_PODSPEC_FILE_PATH} \
            ${ADN_LEVELPLAY_ADAPTER_PODSPEC_FILE_PATH} \
            ${ADN_LEVELPLAY_ADAPTER_JSON_PODSPEC_FILE_PATH}
          echo "✅ Cleaned up"

      - name: Setup Git User
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Commit Changes
        run: |
          git add .

          if git diff --cached --quiet; then
            echo "No change to commit"
          else
            PODSPEC_VERSION=$(
              git diff --cached --name-only | awk -F/ '/\.podspec$/ && NF >= 3 {print $(NF-1); exit}'
            )
            if [ -n "$PODSPEC_VERSION" ]; then
              git commit -m "Levelplay adapter podspec synced (version $PODSPEC_VERSION)"
            else
              git commit -m "Levelplay adapter podspec synced"
            fi
            git push
            echo "✅ Changes pushed"
          fi
